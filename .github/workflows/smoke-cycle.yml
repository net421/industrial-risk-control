name: Smoke Cycle

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q
      - run: python -m industrial_research_lab.cli --profile smoke --output artifacts/smoke --fresh
      - run: python scripts/validate_portfolio_run.py --run-dir artifacts/smoke
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: smoke-cycle-${{ github.run_id }}
          path: |
            artifacts/smoke/summary.json
            artifacts/smoke/summary.csv
            artifacts/smoke/VALIDATION_REPORT.md
            artifacts/smoke/PERFORMANCE_REPORT.md
            artifacts/smoke/RUN_REPORT.md
            artifacts/smoke/CHECKSUMS.sha256
          retention-days: 14
