name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Unit tests
        run: python -m pytest -q
      - name: Repository policy validation
        run: python scripts/validate_repository.py
      - name: Deterministic CI profile
        run: python -m industrial_research_lab.cli --profile ci --output "artifacts/ci-${{ matrix.python-version }}" --fresh
      - name: Validate artifacts
        run: python scripts/validate_portfolio_run.py --run-dir "artifacts/ci-${{ matrix.python-version }}"
      - name: Upload compact evidence
        uses: actions/upload-artifact@v4
        with:
          name: ci-python-${{ matrix.python-version }}
          path: artifacts/ci-${{ matrix.python-version }}
          retention-days: 7
