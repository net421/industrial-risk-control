name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q
      - name: Package exact Git tree
        run: |
          git archive --format=zip --output="industrial-risk-control-${GITHUB_REF_NAME}.zip" HEAD
          sha256sum "industrial-risk-control-${GITHUB_REF_NAME}.zip" > "industrial-risk-control-${GITHUB_REF_NAME}.zip.sha256"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          "industrial-risk-control-${GITHUB_REF_NAME}.zip"
          "industrial-risk-control-${GITHUB_REF_NAME}.zip.sha256"
          --generate-notes
