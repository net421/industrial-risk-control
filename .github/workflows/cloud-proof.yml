name: Cloud Proof

on:
  workflow_dispatch:
    inputs:
      max_minutes:
        description: Hosted-runner compute budget in minutes
        required: true
        default: "10"
      profile:
        description: Bounded profile
        required: true
        type: choice
        options: [cloud-proof, smoke, ci]
        default: cloud-proof
      fresh_or_resume:
        description: Hosted runners normally start fresh
        required: true
        type: choice
        options: [fresh, resume]
        default: fresh
      upload_artifacts:
        description: Upload compact evidence files
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  cloud-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      RUN_DIR: artifacts/cloud-proof
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - name: Record Actions-minute warning
        run: |
          echo "## Cloud proof" >> "$GITHUB_STEP_SUMMARY"
          echo "This manual run may consume up to ${{ inputs.max_minutes }} GitHub-hosted minutes." >> "$GITHUB_STEP_SUMMARY"
          echo "It is a bounded server-like proof, not the completed 90-minute local proof." >> "$GITHUB_STEP_SUMMARY"
      - name: Run bounded proof
        id: research_run
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          fresh_flag=""
          if [[ "${{ inputs.fresh_or_resume }}" == "fresh" ]]; then fresh_flag="--fresh"; fi
          python -m industrial_research_lab.cli --profile "${{ inputs.profile }}" --max-minutes "${{ inputs.max_minutes }}" --output "$RUN_DIR" $fresh_flag
      - name: Validate compact evidence
        if: steps.research_run.outcome == 'success'
        run: python scripts/validate_portfolio_run.py --run-dir "$RUN_DIR"
      - name: Write local/server fallback
        if: steps.research_run.outcome != 'success'
        run: |
          echo "The hosted proof did not complete. Run scripts/run_local_cloud_proof_equivalent.sh or .ps1, or use an AWS/Oracle worker." >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        if: always() && inputs.upload_artifacts
        with:
          name: cloud-proof-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/cloud-proof/summary.json
            artifacts/cloud-proof/summary.csv
            artifacts/cloud-proof/VALIDATION_REPORT.md
            artifacts/cloud-proof/PERFORMANCE_REPORT.md
            artifacts/cloud-proof/RUN_REPORT.md
            artifacts/cloud-proof/CHECKSUMS.sha256
          if-no-files-found: warn
          retention-days: 14
      - name: Preserve failure status
        if: steps.research_run.outcome != 'success'
        run: exit 1
