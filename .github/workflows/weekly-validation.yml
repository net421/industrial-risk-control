name: Weekly Validation

on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - name: Validation only
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p logs
          {
            python -m pytest -q
            python scripts/validate_repository.py
            python -m industrial_research_lab.cli --profile ci --output artifacts/weekly-ci --fresh
            python scripts/validate_portfolio_run.py --run-dir artifacts/weekly-ci
            python .codex/skills/industrial-research-factory/scripts/validate_cycle.py
          } 2>&1 | tee logs/weekly-validation.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-validation-${{ github.run_id }}
          path: |
            logs/weekly-validation.log
            artifacts/weekly-ci/summary.json
            artifacts/weekly-ci/VALIDATION_REPORT.md
            artifacts/weekly-ci/CHECKSUMS.sha256
          if-no-files-found: warn
          retention-days: 14
