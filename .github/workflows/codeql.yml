name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "43 4 * * 3"

permissions:
  security-events: write
  packages: read
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: python
          build-mode: none
      - uses: github/codeql-action/analyze@v4

